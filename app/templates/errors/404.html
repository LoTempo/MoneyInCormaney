{% extends "base.html" %}

{% block title %}Страница не найдена — Семейный бюджет{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-code">404</div>
    <span class="eyebrow">Страница не найдена</span>
    <h1>Похоже, такого адреса нет</h1>
    <p>Возможно, страница была перемещена или в адресе допущена ошибка.</p>
    <a class="button button--primary" href="/">Вернуться на главную</a>
</section>
{% endblock %}
